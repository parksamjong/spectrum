<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Spectrum Analyzer Pro</title>
<style>
:root{
  --bg:#1c1f26;--panel:#23272f;--border:#3a3f4b;
  --c:#22d3ee;--m:#c084fc;--g:#4ade80;--y:#facc15;--r:#f87171;
  --txt:#9aa5b8;--hi:#e8edf5;--rad:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--hi);font-family:'Courier New',monospace;font-size:12px;}

#app{display:grid;grid-template-rows:44px 1fr;grid-template-columns:192px 1fr;height:100vh;transition:grid-template-columns .2s;}
#app.hide-side{grid-template-columns:0px 1fr;}
#hdr{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:0 14px;background:var(--panel);border-bottom:2px solid var(--border);}
#side{overflow-y:auto;overflow-x:hidden;background:var(--panel);border-right:2px solid var(--border);display:flex;flex-direction:column;gap:6px;padding:10px 8px;transition:all .2s;white-space:nowrap;}
#app.hide-side #side{padding:0;border:none;}
#main{display:grid;grid-template-rows:1fr 0.33fr;overflow:hidden;}
#bToggle{font-size:14px;padding:2px 8px;line-height:1;}
#sw{position:relative;overflow:hidden;}
#ow{border-top:2px solid var(--border);position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

/* HEADER */
#logo{font-size:13px;letter-spacing:4px;color:var(--c);font-weight:bold;white-space:nowrap;margin-right:6px;}
.hb{background:var(--bg);color:var(--txt);border:1px solid var(--border);padding:5px 12px;cursor:pointer;border-radius:var(--rad);font-family:inherit;font-size:11px;letter-spacing:1px;transition:all .15s;white-space:nowrap;}
.hb:hover{color:var(--hi);border-color:#5a6070;background:#2a2e38;}
.hb.on{color:var(--c);border-color:var(--c);background:#0e2a30;box-shadow:0 0 10px #22d3ee44;}
.hb.stop{color:var(--r);border-color:var(--r);background:#2a1018;}
.hgap{flex:1;}
#stat{font-size:10px;color:var(--txt);letter-spacing:1px;min-width:220px;text-align:right;}
input[type=file]{display:none;}

/* SIDE */
.sec{border:1px solid var(--border);border-radius:var(--rad);padding:8px 7px;background:#1a1d24;}
.stit{font-size:9px;color:var(--txt);letter-spacing:3px;margin-bottom:7px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:4px;}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:4px;}
.row label{color:var(--txt);font-size:9px;letter-spacing:1px;white-space:nowrap;}
.rv{color:var(--c);font-size:9px;min-width:30px;text-align:right;font-weight:bold;}
input[type=range]{flex:1;height:3px;cursor:pointer;-webkit-appearance:none;appearance:none;background:#3a3f4b;border-radius:2px;outline:none;border:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--c);box-shadow:0 0 6px var(--c);cursor:pointer;}
select{flex:1;background:#1a1d24;color:var(--hi);border:1px solid var(--border);padding:3px 5px;border-radius:3px;font-family:inherit;font-size:10px;cursor:pointer;}
select:focus{outline:none;border-color:var(--c);}

/* PALETTE */
.pal{display:flex;gap:4px;margin-top:3px;}
.pb{flex:1;height:18px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:.13s;}
.pb.on{border-color:#fff;transform:scaleY(1.12);}

/* VU */
.vu{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.vr{display:flex;align-items:center;gap:5px;}
.vl{width:12px;font-size:9px;color:var(--txt);font-weight:bold;}
.vb{flex:1;height:8px;background:#2a2e38;border-radius:3px;overflow:hidden;position:relative;}
.vf{height:100%;width:0%;border-radius:3px;transition:width .05s;}
.vp{position:absolute;top:0;width:3px;height:100%;background:#fff;opacity:.9;border-radius:1px;}

#inf{font-size:9px;color:var(--txt);margin-top:6px;line-height:2;}
#inf b{color:var(--c);}

/* HZ TOOLTIP */
#hz-tip{position:absolute;pointer-events:none;display:none;
  background:rgba(35,39,47,.95);border:1px solid var(--c);
  border-radius:4px;padding:4px 10px;font-size:11px;color:var(--c);
  letter-spacing:1px;white-space:nowrap;z-index:10;top:8px;font-weight:bold;}

/* GUIDE */
#guide{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#23272f;border:2px solid var(--c);border-radius:10px;
  padding:24px 30px;z-index:9999;min-width:320px;font-size:11px;line-height:2.4;}
#guide h3{color:var(--c);letter-spacing:3px;font-size:14px;margin-bottom:12px;}
#guide .step b{color:var(--y);}
#guide .step span{color:var(--g);}
#guide .note{font-size:9px;color:var(--txt);margin-top:10px;}
#guide button{margin-top:14px;background:#0e2a30;border:1px solid var(--c);color:var(--c);
  padding:6px 20px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;}
#guide button:hover{background:#1a4050;}
</style>
</head>
<body>
<div id="app">

<div id="hdr">
  <button class="hb" id="bToggle" title="패널 토글">◀</button>
  <div id="logo">◈ SPECTRUM PRO</div>
  <button class="hb" id="bSys">🖥 시스템 오디오</button>
  <button class="hb" id="bMic">🎤 마이크</button>
  <button class="hb" id="bFile">📁 파일 재생</button>
  <input type="file" id="fi" accept="audio/*,video/*">
  <button class="hb" id="bTest">테스트</button>
  <button class="hb" id="bStop" style="display:none">⏹ 정지</button>
  <div class="hgap"></div>
  <button class="hb" id="bFull">⛶ 전체화면</button>
  <div id="stat">소스를 선택하세요</div>
</div>

<div id="side">
  <div class="sec">
    <div class="stit">스펙트럼</div>
    <div class="row"><label>FFT</label>
      <select id="fft">
        <option value="2048">2048</option>
        <option value="4096">4096</option>
        <option value="8192">8192</option>
        <option value="16384" selected>16384</option>
      </select>
    </div>
    <div class="row"><label>SMOOTH</label><input type="range" id="sm" min="0" max="97" value="80"><span class="rv" id="vsm">80</span></div>
    <div class="row"><label>GAIN</label><input type="range" id="gn" min="1" max="40" value="18"><span class="rv" id="vgn">18</span></div>
    <div class="row"><label>MIN dB</label><input type="range" id="md" min="-120" max="-40" value="-90" step="5"><span class="rv" id="vmd">-90</span></div>
    <div class="row"><label>MODE</label>
      <select id="sm2">
        <option value="bar">BAR</option>
        <option value="line">LINE</option>
        <option value="mirror">MIRROR</option>
        <option value="dot">DOT</option>
      </select>
    </div>
    <div class="row"><label>PEAK</label>
      <select id="ph">
        <option value="60">60f</option>
        <option value="120" selected>120f</option>
        <option value="240">240f</option>
        <option value="0">OFF</option>
      </select>
    </div>
  </div>

  <div class="sec">
    <div class="stit">컬러</div>
    <div class="pal">
      <div class="pb on" id="p0" style="background:linear-gradient(90deg,#f87171,#facc15,#4ade80,#22d3ee,#818cf8,#c084fc)"></div>
      <div class="pb" id="p1" style="background:linear-gradient(90deg,#1e1b4b,#f97316,#facc15,#fff)"></div>
      <div class="pb" id="p2" style="background:linear-gradient(90deg,#0c4a6e,#0ea5e9,#22d3ee,#fff)"></div>
      <div class="pb" id="p3" style="background:linear-gradient(90deg,#052e16,#4ade80,#86efac,#fff)"></div>
    </div>
  </div>

  <div class="sec">
    <div class="stit">오실로스코프</div>
    <div class="row"><label>TIME</label>
      <select id="td">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="2">2×</option>
        <option value="4">4×</option>
      </select>
    </div>
    <div class="row"><label>TRIG</label><input type="range" id="tl" min="0" max="100" value="50"><span class="rv" id="vtl">50</span></div>
    <div class="row"><label>WIDTH</label><input type="range" id="lw" min="1" max="5" value="1.5" step=".5"><span class="rv" id="vlw">1.5</span></div>
    <div class="row"><label>GLOW</label><input type="range" id="sg" min="0" max="30" value="20"><span class="rv" id="vsg">20</span></div>
    <div class="row"><label>STYLE</label>
      <select id="ss">
        <option value="line" selected>VECTOR</option>
        <option value="fill">FILL</option>
        <option value="dot">DOT</option>
      </select>
    </div>
  </div>

  <div class="sec">
    <div class="stit">레벨 미터</div>
    <div class="vu">
      <div class="vr"><span class="vl">L</span><div class="vb"><div class="vf" id="vfl"></div><div class="vp" id="vpl"></div></div></div>
      <div class="vr"><span class="vl">R</span><div class="vb"><div class="vf" id="vfr"></div><div class="vp" id="vpr"></div></div></div>
    </div>
    <div id="inf">피크: <b id="ipf">—</b><br>레벨: <b id="ilv">—</b><br>RMS: <b id="irs">—</b></div>
  </div>
</div>

<div id="main">
  <div id="sw"><canvas id="sc"></canvas><div id="hz-tip"></div></div>
  <div id="ow"><canvas id="oc"></canvas></div>
</div>

</div>

<div id="guide">
  <h3>시스템 오디오 캡처</h3>
  <div class="step">① <b>전체 화면</b> 탭 선택</div>
  <div class="step">② 하단 <span>시스템 오디오 공유</span> 토글 ON</div>
  <div class="step">③ <b>공유</b> 클릭</div>
  <div class="note">⚠ Chrome/Edge 전용 · 소리 재생 없이 그래픽만 표시됩니다</div>
  <button onclick="document.getElementById('guide').style.display='none';doCapture()">시작</button>
</div>

<script>
const NUM=1024, FMIN=20, FMAX=20000;
let actx, an, src, swId, vuPL=0, vuPR=0, pal=0;
const peaks=new Float32Array(NUM), phc=new Int32Array(NUM);

const sc=document.getElementById('sc'), oc=document.getElementById('oc');
const sctx=sc.getContext('2d'), octx=oc.getContext('2d');
const BFREQ=Array.from({length:NUM+1},(_,i)=>FMIN*Math.pow(FMAX/FMIN,i/NUM));

// 주파수 레이블 (촘촘하게)
const FLBL=[
  [20,'20'],[30,'30'],[50,'50'],[80,'80'],
  [100,'100'],[200,'200'],[500,'500'],[1000,'1k'],
  [2000,'2k'],[5000,'5k'],[10000,'10k'],[20000,'20k']
];
// 대역 이름
const BANDS=[[20,250,'SUB / BASS'],[250,2500,'MID'],[2500,8000,'HIGH-MID'],[8000,20000,'AIR']];

function resize(){
  const sw=document.getElementById('sw'), ow=document.getElementById('ow');
  sc.width=sw.clientWidth; sc.height=sw.clientHeight;
  oc.width=ow.clientWidth; oc.height=ow.clientHeight;
}
resize();
new ResizeObserver(resize).observe(document.getElementById('main'));

[['sm','vsm'],['gn','vgn'],['md','vmd'],['tl','vtl'],['lw','vlw'],['sg','vsg']].forEach(([id,vid])=>{
  const el=document.getElementById(id), lb=document.getElementById(vid);
  if(el&&lb) el.addEventListener('input',()=>lb.textContent=el.value);
});

// 팔레트 — 밝은 배경에 잘 보이는 진한 색조
function gc(i, a=1, l=48){
  const t=i/(NUM-1);
  if(pal===0) return `hsla(${Math.round(t*300)},90%,${l}%,${a})`;
  if(pal===1) return `hsla(${Math.round(t*55)},95%,${Math.round(42+t*22)}%,${a})`;
  if(pal===2) return `hsla(${Math.round(195+t*35)},90%,${Math.round(44+t*22)}%,${a})`;
  return `hsla(120,88%,${Math.round(34+t*28)}%,${a})`;
}
document.querySelectorAll('.pb').forEach((b,i)=>{
  b.addEventListener('click',()=>{
    pal=i;
    document.querySelectorAll('.pb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  });
});

function bands(data, sr){
  const ny=sr/2, n=data.length;
  return Float32Array.from({length:NUM},(_,i)=>{
    const f1=BFREQ[i], f2=BFREQ[i+1];
    const b1=Math.max(0,Math.floor(f1/ny*n));
    const b2=Math.min(n-1,Math.ceil(f2/ny*n));
    let mx=0; for(let b=b1;b<=b2;b++) mx=Math.max(mx,data[b]);
    return mx/255;
  });
}
function f2x(f,W){
  return 1+(Math.log(f/FMIN)/Math.log(FMAX/FMIN))*(W-2);
}

// Hz 커서
let cursorHz=null;
const hzTip=document.getElementById('hz-tip');
sc.addEventListener('mousemove',e=>{
  const r=sc.getBoundingClientRect();
  const ratio=(e.clientX-r.left)/r.width;
  cursorHz=Math.round(FMIN*Math.pow(FMAX/FMIN,Math.max(0,Math.min(1,ratio))));
  hzTip.textContent=cursorHz>=1000?(cursorHz/1000).toFixed(1)+'kHz':cursorHz+'Hz';
  hzTip.style.display='block';
  hzTip.style.left=Math.min(e.clientX-r.left+12, r.width-80)+'px';
});
sc.addEventListener('mouseleave',()=>{ cursorHz=null; hzTip.style.display='none'; });

function drawSpec(vals){
  const c=sctx, W=sc.width, H=sc.height;
  const mode=document.getElementById('sm2').value;
  const phf=parseInt(document.getElementById('ph').value);
  const FOOT=24, TOP=4, pH=H-FOOT-TOP;
  const bw=(W-2)/NUM, gap=Math.max(.5,bw*.08), bW=bw-gap;

  // 배경: 진한 차콜 (너무 어둡지 않게)
  c.fillStyle='#1c1f26'; c.fillRect(0,0,W,H);

  // 수평 그리드 — 잘 보이는 밝은 회색
  c.setLineDash([2,6]); c.lineWidth=1;
  for(let d=0;d<=100;d+=20){
    const y=TOP+pH*(1-d/100);
    c.strokeStyle='#3a3f4b';
    c.beginPath(); c.moveTo(0,y); c.lineTo(W,y); c.stroke();
    c.fillStyle='#8896aa'; c.font='bold 9px Courier New'; c.textAlign='left';
    c.fillText(d+'%',3,y-3);
  }
  // 수직 주파수 가이드
  for(const [f] of FLBL){
    c.strokeStyle='#2e3340';
    const x=f2x(f,W);
    c.beginPath(); c.moveTo(x,TOP); c.lineTo(x,H-FOOT); c.stroke();
  }
  c.setLineDash([]);

  // 파형
  if(mode==='line'){
    c.save();
    c.beginPath(); c.moveTo(1,TOP+pH);
    for(let i=0;i<NUM;i++) c.lineTo(1+i*bw+bW/2, TOP+pH-vals[i]*pH);
    c.lineTo(W-1,TOP+pH); c.closePath();
    const gf=c.createLinearGradient(0,TOP,0,TOP+pH);
    gf.addColorStop(0,gc(512,.35)); gf.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=gf; c.fill();
    c.beginPath();
    for(let i=0;i<NUM;i++){
      const x=1+i*bw+bW/2;
      i?c.lineTo(x,TOP+pH-vals[i]*pH):c.moveTo(x,TOP+pH-vals[i]*pH);
    }
    c.shadowBlur=12; c.shadowColor=gc(512); c.strokeStyle=gc(512); c.lineWidth=2; c.stroke();
    c.shadowBlur=0; c.restore();

  } else if(mode==='mirror'){
    const my=TOP+pH/2;
    for(let i=0;i<NUM;i++){
      const x=1+i*bw, h=vals[i]*pH/2; if(h<.5) continue;
      c.shadowBlur=10; c.shadowColor=gc(i,.8);
      const gm=c.createLinearGradient(0,my-h,0,my+h);
      gm.addColorStop(0,gc(i,1,72)); gm.addColorStop(.5,gc(i,.7,50)); gm.addColorStop(1,gc(i,1,72));
      c.fillStyle=gm; c.fillRect(x,my-h,bW,h*2);
    }
    c.shadowBlur=0;

  } else if(mode==='dot'){
    for(let i=0;i<NUM;i++){
      const x=1+i*bw+bW/2, steps=Math.floor(vals[i]*pH/5);
      for(let s=0;s<steps;s++){
        const y=TOP+pH-s*5, a=.5+.5*(s/steps);
        c.fillStyle=gc(i,a,52+s*2); c.shadowBlur=4; c.shadowColor=gc(i);
        c.beginPath(); c.arc(x,y,Math.max(1.5,bW/3),0,Math.PI*2); c.fill();
      }
    }
    c.shadowBlur=0;

  } else {
    // BAR — 핵심: 진하고 선명한 그라디언트
    for(let i=0;i<NUM;i++){
      const x=1+i*bw, bH=Math.max(0,vals[i]*pH), y=TOP+pH-bH;
      if(phf>0){
        if(vals[i]>peaks[i]){ peaks[i]=vals[i]; phc[i]=phf; }
        else if(phc[i]>0) phc[i]--;
        else peaks[i]=Math.max(0,peaks[i]-.007);
      }
      if(bH<1) continue;

      // 그림자 글로우
      c.shadowBlur=bH>10?20:8; c.shadowColor=gc(i,.9);

      // 그라디언트: 위(밝음) → 아래(어두움)
      const gb=c.createLinearGradient(0,y,0,TOP+pH);
      gb.addColorStop(0,  gc(i,1,  78));
      gb.addColorStop(.3, gc(i,1,  60));
      gb.addColorStop(.75,gc(i,.95,42));
      gb.addColorStop(1,  gc(i,.5, 28));
      c.fillStyle=gb; c.fillRect(x,y,bW,bH);

      // 상단 하이라이트 (흰색 얇은 선)
      c.shadowBlur=0;
      c.fillStyle=`rgba(255,255,255,0.6)`;
      c.fillRect(x,y,bW,Math.min(2,bH*.1));

      // 피크 마커
      if(phf>0 && peaks[i]>.015){
        const py=TOP+pH-peaks[i]*pH;
        c.shadowBlur=8; c.shadowColor=gc(i,1,88);
        c.fillStyle=gc(i,1,88); c.fillRect(x,py,bW,2);
      }
    }
    c.shadowBlur=0;
  }

  // 하단: 대역 배경 라벨
  const BR=H-FOOT+2;
  for(const [f1,f2,name] of BANDS){
    const x1=f2x(f1,W), x2=f2x(f2,W);
    c.fillStyle='#252830'; c.fillRect(x1,BR,x2-x1,15);
    c.fillStyle='#3a3f4b'; c.fillRect(x1,BR,1,15);
    c.fillStyle='#6878a0'; c.font='bold 8px Courier New'; c.textAlign='center';
    c.fillText(name,(x1+x2)/2,BR+11);
  }
  c.fillStyle='#3a3f4b'; c.fillRect(W-1,BR,1,15);

  // 하단: Hz 눈금
  c.font='9px Courier New'; c.textAlign='center';
  for(const [f,lb] of FLBL){
    const bi=Math.round((Math.log(f/FMIN)/Math.log(FMAX/FMIN))*(NUM-1));
    const x=f2x(f,W);
    c.fillStyle='#4a5060'; c.fillRect(x-.5,BR-4,1,5);
    c.fillStyle=gc(bi,1,65); c.fillText(lb,x,H-FOOT+32);
  }

  // 커서 Hz 선
  if(cursorHz){
    const cx=f2x(cursorHz,W);
    c.strokeStyle='rgba(255,255,255,0.25)'; c.lineWidth=1; c.setLineDash([3,5]);
    c.beginPath(); c.moveTo(cx,TOP); c.lineTo(cx,TOP+pH); c.stroke();
    c.setLineDash([]);
  }

  // 피크 주파수
  let pk=0;
  for(let i=1;i<NUM;i++) if(vals[i]>vals[pk]) pk=i;
  const pf=Math.round(Math.sqrt(BFREQ[pk]*BFREQ[pk+1]));
  document.getElementById('ipf').textContent=pf<1000?pf+'Hz':(pf/1000).toFixed(2)+'kHz';
  document.getElementById('ilv').textContent=(vals[pk]*100).toFixed(1)+'%';
}

function drawScope(td){
  const c=octx, W=oc.width, H=oc.height;
  const tDiv=parseFloat(document.getElementById('td').value);
  const trigLv=parseInt(document.getElementById('tl').value)/100;
  const lw=parseFloat(document.getElementById('lw').value);
  const glow=parseInt(document.getElementById('sg').value);
  const style=document.getElementById('ss').value;

  c.fillStyle='#181b22'; c.fillRect(0,0,W,H);
  c.strokeStyle='#2e3340'; c.lineWidth=1; c.setLineDash([2,5]);
  for(let i=1;i<4;i++){
    c.beginPath(); c.moveTo(W*i/4,0); c.lineTo(W*i/4,H); c.stroke();
  }
  c.beginPath(); c.moveTo(0,H/2); c.lineTo(W,H/2); c.stroke();
  c.setLineDash([]);
  const ty=H*0.05+trigLv*H*0.9;
  c.strokeStyle='rgba(250,204,21,.3)'; c.setLineDash([4,8]);
  c.beginPath(); c.moveTo(0,ty); c.lineTo(W,ty); c.stroke(); c.setLineDash([]);

  const n=Math.min(td.length,Math.floor(td.length/tDiv));
  let si=0;
  for(let i=1;i<n-1;i++){
    if(td[i-1]<=128&&td[i]>128){ si=i; break; }
  }

  let tMin=255, tMax=0;
  for(let i=si;i<si+n&&i<td.length;i++){ if(td[i]<tMin)tMin=td[i]; if(td[i]>tMax)tMax=td[i]; }
  const tRange=Math.max(tMax-tMin,4);
  const tMid=(tMax+tMin)/2;
  function sy(s){ return H/2 - ((s-tMid)/tRange)*H*0.88; }

  const COL=['#22d3ee','#f97316','#38bdf8','#4ade80'][pal];
  const COL2=['rgba(34,211,238,','rgba(249,115,22,','rgba(56,189,248,','rgba(74,222,128,'][pal];
  c.shadowBlur=glow; c.shadowColor=COL;

  if(style==='dot'){
    for(let i=0;i<W;i++){
      const idx=si+Math.floor(i/W*n); if(idx>=td.length) break;
      c.fillStyle=COL2+'0.8)'; c.fillRect(i,sy(td[idx]),lw,lw);
    }
  } else if(style==='fill'){
    c.beginPath();
    for(let i=0;i<W;i++){
      const idx=si+Math.floor(i/W*n); if(idx>=td.length) break;
      i===0?c.moveTo(0,sy(td[idx])):c.lineTo(i,sy(td[idx]));
    }
    c.lineTo(W,H); c.lineTo(0,H); c.closePath();
    const fg=c.createLinearGradient(0,0,0,H);
    fg.addColorStop(0,COL2+'.45)'); fg.addColorStop(1,COL2+'0)');
    c.fillStyle=fg; c.fill();
    c.beginPath();
    for(let i=0;i<W;i++){
      const idx=si+Math.floor(i/W*n); if(idx>=td.length) break;
      i===0?c.moveTo(0,sy(td[idx])):c.lineTo(i,sy(td[idx]));
    }
    c.strokeStyle=COL; c.lineWidth=lw; c.stroke();
  } else {
    const pts=[];
    for(let i=0;i<W;i++){
      const idx=si+Math.floor(i/W*n); if(idx>=td.length) break;
      pts.push([i, sy(td[idx])]);
    }
    if(pts.length>1){
      const NUM_LINES=30, SPREAD=H*0.35;
      const baseHue=(Date.now()/60)%360;
      for(let l=0;l<NUM_LINES;l++){
        const t=l/(NUM_LINES-1);
        const yOff=(t-0.5)*SPREAD;
        const ctr=1-Math.abs(t-0.5)*2;
        const alpha=0.08+ctr*0.55;
        const hue=(baseHue+t*60)%360;
        const lineCol=`hsla(${hue},100%,65%,${alpha.toFixed(2)})`;
        c.shadowBlur=glow*ctr; c.shadowColor=`hsl(${hue},100%,60%)`;
        c.beginPath();
        c.moveTo(pts[0][0], pts[0][1]+yOff);
        for(let i=1;i<pts.length-1;i++){
          const mx=(pts[i][0]+pts[i+1][0])/2;
          const my=(pts[i][1]+pts[i+1][1])/2+yOff;
          c.quadraticCurveTo(pts[i][0],pts[i][1]+yOff,mx,my);
        }
        c.lineTo(pts[pts.length-1][0],pts[pts.length-1][1]+yOff);
        c.strokeStyle=lineCol;
        c.lineWidth=0.6;
        c.stroke();
      }
      c.shadowBlur=0;
    }
  }
  c.shadowBlur=0;
  c.fillStyle='rgba(136,150,170,.8)'; c.font='bold 9px Courier New';
  c.textAlign='left'; c.fillText('OSCILLOSCOPE',5,13);

  let rms=0; for(const v of td) rms+=(v/128)**2;
  rms=Math.sqrt(rms/td.length);
  document.getElementById('irs').textContent=(rms*100).toFixed(1)+'%';

  const vu=Math.min(rms*1.6,1);
  ['l','r'].forEach((ch,ci)=>{
    const f=document.getElementById('vf'+ch), p=document.getElementById('vp'+ch);
    f.style.width=(vu*100)+'%';
    f.style.background=vu>.85?'linear-gradient(90deg,#22c55e,#eab308,#ef4444)':
                        vu>.6 ?'linear-gradient(90deg,#22c55e,#eab308)':'#22c55e';
    const pk=ci===0?(vuPL=Math.max(vuPL*.994,vu)):(vuPR=Math.max(vuPR*.994,vu));
    p.style.left=(pk*100)+'%';
  });
}

let aid=null;
function loop(){
  aid=requestAnimationFrame(loop);
  if(!an) return;
  an.smoothingTimeConstant=parseInt(document.getElementById('sm').value)/100;
  an.minDecibels=parseInt(document.getElementById('md').value);
  const fd=new Uint8Array(an.frequencyBinCount);
  const td=new Uint8Array(an.fftSize);
  an.getByteFrequencyData(fd); an.getByteTimeDomainData(td);
  const gain=parseInt(document.getElementById('gn').value)/10;
  const v=bands(fd,actx.sampleRate);
  for(let i=0;i<NUM;i++) v[i]=Math.min(1,v[i]*gain);
  drawSpec(v); drawScope(td);
}

async function initCtx(){
  if(!actx){
    actx=new(window.AudioContext||window.webkitAudioContext)();
    an=actx.createAnalyser();
    an.fftSize=parseInt(document.getElementById('fft').value);
  }
  if(actx.state==='suspended') await actx.resume();
}
function stopSrc(){
  if(src){
    try{ src.disconnect(); src.stop?.(); }catch(e){}
    if(src._stream) try{ src._stream.getTracks().forEach(t=>t.stop()); }catch(e){}
    src=null;
  }
  if(swId){ clearInterval(swId); swId=null; }
}
function setBtn(id){
  ['bSys','bMic','bFile','bTest'].forEach(b=>document.getElementById(b).classList.remove('on'));
  if(id) document.getElementById(id).classList.add('on');
  document.getElementById('bStop').style.display=id?'':'none';
}
function setStat(t){ document.getElementById('stat').textContent=t; }

document.getElementById('fft').addEventListener('change',()=>{ if(an) an.fftSize=parseInt(document.getElementById('fft').value); });

// 사이드바 토글
const bTog=document.getElementById('bToggle'), appEl=document.getElementById('app');
bTog.addEventListener('click',()=>{
  const h=appEl.classList.toggle('hide-side');
  bTog.textContent=h?'▶':'◀';
});

// 전체화면
document.getElementById('bFull').addEventListener('click',()=>{
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); document.getElementById('bFull').textContent='⛶ 창모드'; }
  else{ document.exitFullscreen?.(); document.getElementById('bFull').textContent='⛶ 전체화면'; }
});

// 정지
document.getElementById('bStop').addEventListener('click',()=>{
  stopSrc(); setBtn(null); setStat('정지됨');
  if(aid){ cancelAnimationFrame(aid); aid=null; }
});

// 시스템 오디오
document.getElementById('bSys').addEventListener('click',()=>{ document.getElementById('guide').style.display='block'; });
async function doCapture(){
  await initCtx(); stopSrc();
  try{
    let stream;
    try{
      stream=await navigator.mediaDevices.getDisplayMedia({video:false,audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    }catch{
      stream=await navigator.mediaDevices.getDisplayMedia({video:{width:1,height:1,frameRate:1},audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    }
    const aT=stream.getAudioTracks();
    if(!aT.length){ stream.getTracks().forEach(t=>t.stop()); setStat('⚠ 오디오 없음 — 시스템 오디오 공유 토글을 켜세요'); return; }
    const aOnly=new MediaStream(aT);
    stream.getVideoTracks().forEach(t=>t.stop());
    src=actx.createMediaStreamSource(aOnly); src._stream=stream;
    src.connect(an);
    aT[0].addEventListener('ended',()=>{ stopSrc(); setBtn(null); setStat('공유 중단됨'); });
    setBtn('bSys'); setStat('시스템 오디오 분석 중 | '+aT[0].label);
    if(!aid) loop();
  }catch(e){ setStat(e.name==='NotAllowedError'?'취소됨':'오류: '+e.message); }
}

// 마이크
document.getElementById('bMic').addEventListener('click',async()=>{
  await initCtx(); stopSrc();
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    src=actx.createMediaStreamSource(s); src._stream=s; src.connect(an);
    setBtn('bMic'); setStat('마이크 분석 중');
    if(!aid) loop();
  }catch(e){ setStat('마이크 오류: '+e.message); }
});

// 파일
document.getElementById('bFile').addEventListener('click',()=>document.getElementById('fi').click());
document.getElementById('fi').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f) return;
  await initCtx(); stopSrc();
  const decoded=await actx.decodeAudioData(await f.arrayBuffer());
  src=actx.createBufferSource(); src.buffer=decoded; src.loop=true;
  src.connect(an); src.connect(actx.destination); src.start();
  setBtn('bFile'); setStat('파일 재생 중: '+f.name);
  if(!aid) loop();
});

// 테스트
document.getElementById('bTest').addEventListener('click',async()=>{
  if(document.getElementById('bTest').classList.contains('on')){ stopSrc(); setBtn(null); setStat('정지됨'); return; }
  await initCtx(); stopSrc();
  const osc=actx.createOscillator(); osc.type='sine';
  const og=actx.createGain(); og.gain.value=.6;
  const mg=actx.createGain(); mg.gain.value=1;
  const seq=[55,110,220,440,880,1760,3520,7040,14080,7040,3520,1760,880,440,220,110];
  let si=0;
  swId=setInterval(()=>{ osc.frequency.setTargetAtTime(seq[si++%seq.length],actx.currentTime,.12); },350);
  osc.connect(og); og.connect(mg); mg.connect(an);
  osc.start();
  src={ disconnect:()=>{try{og.disconnect();mg.disconnect();}catch(e){}}, stop:()=>{try{osc.stop();}catch(e){}} };
  setBtn('bTest'); setStat('테스트 스윕 중');
  if(!aid) loop();
});
</script>
